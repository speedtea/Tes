<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL Marketplace | Terintegrasi Penuh</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; }
        .bg-amazon-dark { background-color: #131921; }
        .amazon-orange { background-color: #febd69; }
        .swiper-pagination-bullet-active { background: #febd69 !important; }
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="pb-20 md:pb-0">

<header class="bg-amazon-dark text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
        <div class="text-2xl font-bold flex items-center gap-2 cursor-pointer" onclick="filterProduct('all')">
            <span>IQL</span><span class="text-[#febd69]">STORE</span>
        </div>
        <div class="hidden md:flex flex-1 mx-8">
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari produk impianmu..." class="w-full p-2 rounded-l-md text-black outline-none">
            <button class="bg-[#febd69] p-2 rounded-r-md text-black">🔍</button>
        </div>
        <div class="flex gap-6 items-center">
            <div class="relative cursor-pointer group" onclick="toggleCart()">
                <span class="text-2xl">🛒</span>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold rounded-full px-1.5 py-0.5">0</span>
            </div>
        </div>
    </div>
</header>

<section class="container mx-auto p-4">
    <div class="swiper heroSwiper rounded-xl overflow-hidden shadow-lg border-b-4 border-[#febd69]">
        <div class="swiper-wrapper">
            <div class="swiper-slide relative">
                <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200" class="w-full h-[180px] md:h-[350px] object-cover">
                <div class="absolute inset-0 bg-black/40 flex flex-col justify-center p-8 text-white">
                    <h2 class="text-2xl md:text-4xl font-bold">FLASH SALE IS LIVE!</h2>
                    <p>Diskon Gila-gilaan hanya hari ini.</p>
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200" class="w-full h-[180px] md:h-[350px] object-cover">
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
</section>

<section class="container mx-auto p-4">
    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-red-100">
        <div class="bg-red-600 p-4 flex flex-wrap justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <h2 class="text-xl font-bold italic tracking-wider animate-pulse-fast">⚡ FLASH SALE</h2>
                <div id="countdown" class="flex gap-2 text-black font-bold text-sm">
                    <span id="hours" class="bg-white px-2 py-1 rounded">00</span>:
                    <span id="minutes" class="bg-white px-2 py-1 rounded">00</span>:
                    <span id="seconds" class="bg-white px-2 py-1 rounded">00</span>
                </div>
            </div>
        </div>
        <div class="p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4" id="flashSaleContainer"></div>
    </div>
</section>

<section class="container mx-auto p-4 grid grid-cols-4 gap-2 md:gap-4 text-center">
    <div onclick="filterProduct('gadget')" class="cursor-pointer group">
        <div class="bg-white p-3 rounded-2xl shadow-sm group-hover:shadow-md border border-transparent group-hover:border-orange-300 transition">
            <img src="https://cdn-icons-png.flaticon.com/512/644/644458.png" class="w-10 mx-auto">
        </div>
        <p class="text-[10px] md:text-sm font-bold mt-2 text-gray-700">Gadget</p>
    </div>
    <div onclick="filterProduct('fashion')" class="cursor-pointer group">
        <div class="bg-white p-3 rounded-2xl shadow-sm group-hover:shadow-md border border-transparent group-hover:border-orange-300 transition">
            <img src="https://cdn-icons-png.flaticon.com/512/3050/3050239.png" class="w-10 mx-auto">
        </div>
        <p class="text-[10px] md:text-sm font-bold mt-2 text-gray-700">Fashion</p>
    </div>
    <div onclick="filterProduct('elektronik')" class="cursor-pointer group">
        <div class="bg-white p-3 rounded-2xl shadow-sm group-hover:shadow-md border border-transparent group-hover:border-orange-300 transition">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png" class="w-10 mx-auto">
        </div>
        <p class="text-[10px] md:text-sm font-bold mt-2 text-gray-700">Elektronik</p>
    </div>
    <div onclick="filterProduct('rumah')" class="cursor-pointer group">
        <div class="bg-white p-3 rounded-2xl shadow-sm group-hover:shadow-md border border-transparent group-hover:border-orange-300 transition">
            <img src="https://cdn-icons-png.flaticon.com/512/2667/2667231.png" class="w-10 mx-auto">
        </div>
        <p class="text-[10px] md:text-sm font-bold mt-2 text-gray-700">Rumah</p>
    </div>
</section>

<section class="container mx-auto p-4">
    <h2 class="text-xl font-bold mb-4 border-l-4 border-orange-400 pl-3" id="categoryTitle">Produk Pilihan</h2>
    <div id="productContainer" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
</section>

<div id="cartDrawer" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 p-6 flex flex-col">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Keranjang Saya</h2>
        <button onclick="toggleCart()" class="text-2xl">&times;</button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto space-y-4"></div>
    <div class="border-t pt-4 mt-4">
        <div class="flex justify-between font-bold text-lg mb-4">
            <span>Total:</span>
            <span id="cartTotal">Rp 0</span>
        </div>
        <button onclick="checkoutWA()" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 transition">Checkout via WhatsApp</button>
    </div>
</div>
<div id="cartOverlay" class="fixed inset-0 bg-black/50 z-[55] hidden" onclick="toggleCart()"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
// 1. DATA PRODUK
const products = [
    { id: 1, category: 'gadget', name: "IQL Smart Watch v5", price: 850000, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400", link: "https://shopee.co.id", flash: true },
    { id: 2, category: 'gadget', name: "Pro Bass Wireless", price: 1200000, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400", link: "https://shopee.co.id", flash: true },
    { id: 9, category: 'gadget', name: "Tablet Pro 11 Inch", price: 4500000, img: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400", link: "https://shopee.co.id", flash: false },
    { id: 4, category: 'fashion', name: "IQL Sneaker Runner", price: 450000, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400", link: "https://shopee.co.id", flash: true },
    { id: 12, category: 'fashion', name: "Jaket Bomber Exclusive", price: 550000, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", link: "https://shopee.co.id", flash: false },
    { id: 3, category: 'elektronik', name: "Camera Mirrorless 4K", price: 7500000, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400", link: "https://shopee.co.id", flash: false },
    { id: 16, category: 'rumah', name: "Air Purifier Smart", price: 1800000, img: "https://images.unsplash.com/photo-1585771724684-252702b6442e?w=400", link: "https://shopee.co.id", flash: true },
    { id: 17, category: 'rumah', name: "Set Pisau Dapur Pro", price: 450000, img: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?w=400", link: "https://shopee.co.id", flash: false }
];

let cart = JSON.parse(localStorage.getItem('IQL_CART')) || [];

// 2. FUNGSI RENDER (DIPERBAIKI)
function renderProducts(data = products) {
    const container = document.getElementById('productContainer');
    const flashContainer = document.getElementById('flashSaleContainer');
    
    // Kosongkan dulu
    container.innerHTML = "";
    if(flashContainer) flashContainer.innerHTML = "";

    data.forEach(p => {
        const cardHtml = `
            <div class="product-card bg-white rounded-lg overflow-hidden shadow-sm p-2 cursor-pointer border hover:border-orange-400 animate-fade" onclick="showPopup(${p.id})">
                <img src="${p.img}" class="w-full h-32 md:h-40 object-cover rounded">
                <div class="mt-2">
                    <h4 class="text-[11px] md:text-xs font-medium line-clamp-2 h-8">${p.name}</h4>
                    <p class="font-bold text-red-600 text-sm">Rp ${p.price.toLocaleString()}</p>
                </div>
            </div>`;
        
        // Pisahkan Flash Sale dan Produk Biasa
        if(p.flash && flashContainer) {
            flashContainer.innerHTML += cardHtml;
        } else {
            container.innerHTML += cardHtml;
        }
    });
    updateCartUI();
}

// 3. FUNGSI FILTER (YANG TADI HILANG)
function filterProduct(cat) {
    const title = document.getElementById('categoryTitle');
    if (cat === 'all') {
        title.innerText = "Produk Pilihan";
        renderProducts(products);
    } else {
        title.innerText = "Koleksi " + cat.charAt(0).toUpperCase() + cat.slice(1);
        const filtered = products.filter(p => p.category === cat);
        renderProducts(filtered);
    }
}

// 4. FUNGSI PENCARIAN
function searchProduct() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(query));
    renderProducts(filtered);
}

// 5. SISTEM KERANJANG & MODAL
function addToCart(id) {
    const product = products.find(p => p.id === id);
    const exists = cart.find(item => item.id === id);
    if (exists) exists.qty++; else cart.push({ ...product, qty: 1 });
    saveCart();
    Swal.fire({ icon: 'success', title: 'Berhasil!', showConfirmButton: false, timer: 800 });
    updateCartUI();
}

function updateCartUI() {
    const itemsList = document.getElementById('cartItems');
    const countLabel = document.getElementById('cartCount');
    const totalLabel = document.getElementById('cartTotal');
    let total = 0, count = 0;
    itemsList.innerHTML = "";
    cart.forEach((item, index) => {
        total += item.price * item.qty;
        count += item.qty;
        itemsList.innerHTML += `
            <div class="flex items-center gap-4 bg-gray-50 p-2 rounded-lg text-xs">
                <img src="${item.img}" class="w-10 h-10 object-cover rounded">
                <div class="flex-1"><b>${item.name}</b><br><span class="text-red-500">Rp ${item.price.toLocaleString()} x ${item.qty}</span></div>
                <button onclick="removeFromCart(${index})" class="text-red-500">🗑️</button>
            </div>`;
    });
    countLabel.innerText = count;
    totalLabel.innerText = "Rp " + total.toLocaleString();
}

function removeFromCart(index) { cart.splice(index, 1); saveCart(); updateCartUI(); }
function saveCart() { localStorage.setItem('IQL_CART', JSON.stringify(cart)); }
function toggleCart() { document.getElementById('cartDrawer').classList.toggle('translate-x-full'); document.getElementById('cartOverlay').classList.toggle('hidden'); }

function checkoutWA() {
    if (cart.length === 0) return Swal.fire('Kosong!', 'Isi keranjang dulu', 'warning');
    let msg = "Halo IQL Store, saya mau beli:\n\n" + cart.map(i => `- ${i.name} (${i.qty}x)`).join("\n");
    msg += `\n\nTotal: ${document.getElementById('cartTotal').innerText}`;
    window.open(`https://wa.me/628123456789?text=${encodeURIComponent(msg)}`);
}

function showPopup(id) {
    const p = products.find(x => x.id === id);
    Swal.fire({
        title: `<span class="text-sm">${p.name}</span>`,
        html: `<img src="${p.img}" class="w-full rounded h-40 object-cover mb-4"><p class="text-red-600 font-bold">Rp ${p.price.toLocaleString()}</p><div class="grid gap-2 mt-4"><button onclick="addToCart(${p.id}); Swal.close()" class="bg-orange-400 text-white p-2 rounded">🛒 Keranjang</button><a href="${p.link}" class="bg-red-500 text-white p-2 rounded text-center">Beli di Shopee</a></div>`,
        showConfirmButton: false, showCloseButton: true
    });
}

function startCountdown() {
    const end = new Date(); end.setHours(24, 0, 0, 0);
    setInterval(() => {
        const diff = end - new Date();
        document.getElementById('hours').innerText = String(Math.floor(diff/3600000)).padStart(2,'0');
        document.getElementById('minutes').innerText = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
        document.getElementById('seconds').innerText = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
    }, 1000);
}

window.onload = () => {
    renderProducts();
    startCountdown();
    new Swiper(".heroSwiper", { autoplay: true, pagination: {el: ".swiper-pagination"} });
};
</script>
</body>
</html>
