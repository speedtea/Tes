<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saka - Digital Branding & Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .smooth-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .text-red-500 { color: #ef4444 !important; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#fcfcfc] dark:bg-black text-zinc-900 dark:text-white transition-colors duration-500">

    <header class="pt-20 pb-10 px-6 text-center">
        <div class="relative inline-block mb-6 group">
            <div class="absolute -inset-1 bg-gradient-to-r from-zinc-200 to-zinc-100 dark:from-zinc-800 dark:to-zinc-900 rounded-full blur opacity-25 group-hover:opacity-75 smooth-transition"></div>
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop" class="relative w-24 h-24 rounded-full object-cover border-4 border-white dark:border-zinc-900 shadow-2xl">
        </div>
        <h1 class="text-2xl font-extrabold tracking-tighter uppercase mb-2">Saka</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] opacity-40 mb-8">Curated Leather Goods & Style</p>
        
        <div class="grid grid-cols-3 gap-3 max-w-sm mx-auto mb-12">
            <a href="#recent" class="group bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm hover:shadow-xl transition-all">
                <div class="text-2xl mb-1 group-hover:scale-110 smooth-transition">🔥</div>
                <span class="text-[9px] font-bold uppercase tracking-widest">Hits</span>
            </a>
            <a href="#collections" class="group bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm hover:shadow-xl transition-all">
                <div class="text-2xl mb-1 group-hover:scale-110 smooth-transition">👜</div>
                <span class="text-[9px] font-bold uppercase tracking-widest">Style</span>
            </a>
            <a href="#recomen-ig" class="group bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm hover:shadow-xl transition-all">
                <div class="text-2xl mb-1 group-hover:scale-110 smooth-transition">✨</div>
                <span class="text-[9px] font-bold uppercase tracking-widest">Recom</span>
            </a>
        </div>
    </header>

    <section id="recent" class="py-12 pl-6 overflow-hidden">
        <div class="flex justify-between items-end pr-6 mb-8">
            <h2 class="font-serif italic text-3xl">Recent</h2>
            <span class="text-[10px] uppercase tracking-widest opacity-30">Swipe ➔</span>
        </div>
        <div id="recent-container" class="flex gap-6 overflow-x-auto snap-x snap-mandatory pb-8">
            </div>
    </section>

    <section id="collections" class="py-20 px-6 bg-zinc-50 dark:bg-zinc-950 rounded-t-[3rem]">
        <h2 class="font-serif italic text-3xl mb-10 text-center">Our Collection</h2>
        <div id="collection-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </section>

    <section id="recomen-ig" class="py-20 px-6 border-t dark:border-zinc-900">
        <div class="max-w-7xl mx-auto text-center">
            <h3 class="font-serif italic text-2xl mb-8">@iqbalmaulanas_</h3>
            <div class="elfsight-app-YOUR-ID-HERE"></div>
        </div>
    </section>

    <div class="h-32"></div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-white/20 rounded-[2.5rem] py-4 px-8 flex justify-between items-center shadow-2xl z-50">
        <button onclick="window.scrollTo(0,0)" class="flex flex-col items-center gap-1">
            <span class="text-xl">🏠</span>
            <span class="text-[8px] font-bold uppercase">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">🔍</span>
            <span class="text-[8px] font-bold uppercase">Search</span>
        </button>
        <button class="relative flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">❤️</span>
            <span id="wishlist-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
            <span class="text-[8px] font-bold uppercase">Wish</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">👤</span>
            <span class="text-[8px] font-bold uppercase">Me</span>
        </button>
    </nav>

    <div id="pop" class="fixed inset-0 z-[60] flex items-end justify-center hidden p-4">
        <div onclick="closePop()" class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-zinc-900 rounded-[2.5rem] p-8 shadow-2xl transform transition-transform">
            <img id="pop-img" src="" class="w-full aspect-square object-cover rounded-3xl mb-6 shadow-lg">
            <h2 id="pop-t" class="text-2xl font-bold mb-1"></h2>
            <p id="pop-p" class="text-lg opacity-50 mb-8 font-medium"></p>
            <div class="grid grid-cols-2 gap-4">
                <a id="shopee-link" href="#" target="_blank" class="bg-[#ee4d2d] text-white py-4 rounded-2xl font-bold text-center text-sm shadow-lg shadow-[#ee4d2d]/20 active:scale-95 transition-all">Shopee</a>
                <button onclick="closePop()" class="bg-zinc-100 dark:bg-zinc-800 py-4 rounded-2xl font-bold text-sm active:scale-95 transition-all">Kembali</button>
            </div>
        </div>
    </div>

    <script>
        // DATA PRODUK (Ganti link shopee di sini)
        const products = [
            { id: 1, name: "Card Holder", price: "95.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=500", shopee: "https://shopee.co.id" },
            { id: 2, name: "Hera Backpack", price: "550.000", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500", shopee: "https://shopee.co.id" },
            { id: 3, name: "Urban Messenger", price: "450.000", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=500", shopee: "https://shopee.co.id" },
            { id: 4, name: "Travel Duffle", price: "980.000", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500", shopee: "https://shopee.co.id" }
        ];

        // RENDER PRODUK
        function render() {
            const containers = [document.getElementById('recent-container'), document.getElementById('collection-grid')];
            containers.forEach(container => {
                if(!container) return;
                container.innerHTML = products.map(p => `
                    <div onclick="openPop('${p.name}', '${p.price}', '${p.img}', '${p.shopee}')" class="group cursor-pointer relative ${container.id === 'recent-container' ? 'min-w-[220px] snap-start' : ''}">
                        <div class="relative overflow-hidden rounded-2xl mb-3 bg-white dark:bg-zinc-900 p-2 shadow-sm">
                            <button onclick="event.stopPropagation(); toggleWish(this)" class="absolute top-3 right-3 z-20 bg-white/80 backdrop-blur-sm p-1.5 rounded-full shadow-sm active:scale-125 transition-all">
                                <span class="heart-icon text-zinc-400">❤️</span>
                            </button>
                            <img src="${p.img}" class="aspect-[4/5] object-cover rounded-xl group-hover:scale-105 smooth-transition">
                            <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 smooth-transition flex items-center justify-center gap-2">
                                <span class="bg-white p-2 rounded-full text-xs shadow-md">🛒</span>
                                <span class="bg-white p-2 rounded-full text-xs shadow-md">👁️</span>
                            </div>
                        </div>
                        <h4 class="text-[11px] font-bold uppercase tracking-tight">${p.name}</h4>
                        <p class="text-[10px] opacity-50">Rp ${p.price}</p>
                    </div>
                `).join('');
            });
        }

        // FUNGSI POPUP
        function openPop(name, price, img, link) {
            document.getElementById('pop-t').innerText = name;
            document.getElementById('pop-p').innerText = 'Rp ' + price;
            document.getElementById('pop-img').src = img;
            document.getElementById('shopee-link').href = link;
            document.getElementById('pop').classList.remove('hidden');
        }

        function closePop() {
            document.getElementById('pop').classList.add('hidden');
        }

        // FUNGSI WISHLIST
        let wishCount = 0;
        function toggleWish(btn) {
            const icon = btn.querySelector('.heart-icon');
            const badge = document.getElementById('wishlist-count');
            if(!icon.classList.contains('text-red-500')) {
                icon.classList.add('text-red-500');
                wishCount++;
            } else {
                icon.classList.remove('text-red-500');
                wishCount--;
            }
            badge.innerText = wishCount;
            wishCount > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
        }

        window.onload = render;
    </script>
    <script src="https://static.elfsight.com/platform/platform.js" data-use-service-core defer></script>
</body>
</html>
